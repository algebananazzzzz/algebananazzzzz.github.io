name: 2. Preprod Deploy

on:
  push:
    branches: [main]
    tags: ['v*-beta']

concurrency:
  group: preprod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: preprod
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate beta tag
        if: github.ref_type == 'branch'
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch

      - name: Push beta tag
        if: github.ref_type == 'branch'
        run: |
          git tag "v${{ steps.tag.outputs.new_version }}-beta"
          git push origin "v${{ steps.tag.outputs.new_version }}-beta"

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run check
      - run: npm test

      - name: Check for infra changes
        if: github.ref_type == 'branch'
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/**'

      - name: Setup Terraform
        if: github.ref_type == 'tag' || steps.changes.outputs.infra == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: github.ref_type == 'tag' || steps.changes.outputs.infra == 'true'
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          terraform init \
            -backend-config=backend.tfbackend \
            -backend-config="endpoints={s3=\"https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}"
          terraform workspace select -or-create preprod

      - name: Terraform Apply
        if: github.ref_type == 'tag' || steps.changes.outputs.infra == 'true'
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: terraform apply -var-file=config/preprod.tfvars -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" -var="cloudflare_account_id=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" -auto-approve

      - name: Build
        run: npm run build
        env:
          SITE_URL: https://beta.algebananazzzzz.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=preprod-web-pages-algebananazzzzz --branch=main

      - name: Promote to production tag
        uses: actions/github-script@v7
        env:
          BETA_TAG: ${{ format('v{0}-beta', steps.tag.outputs.new_version) || github.ref_name }}
        with:
          script: |
            const betaTag = process.env.BETA_TAG;
            const prodTag = betaTag.replace(/-beta$/, '');
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${prodTag}`,
              sha: context.sha,
            });
            core.info(`Created production tag: ${prodTag}`);
