heroSub: 'I love making things myself, be it brewing, cooking, mixing or developing. Anything that involves my own two hands and creating something that I call my own.'

intro: "I'm Daniel, a CS undergrad at NUS specializing in parallel computing and networking, currently interning at ByteDance."
what:
  - "If I wasn't interested in tech I'd definitely be a chef. I really admire chefs. They cook with passion, infuse their soul into every dish, and love what they put out so much that they'll get heated if someone tells them to do it differently. This is exactly who I want to be."
  - "Lately I've been going deep on bare metal, things like cgroups, cri, compiling kernels, basically what's happening behind the scenes at the hardware."
  - "I'm also deeply invested in LLMs, always keeping myself up to date with what's new. I've been implementing LLM solutions at a large scale, things like knowledge wikis and automated root cause analysis frameworks. In fact the Milky Way is basically a knowledge wiki I manage together with my partner Claude."
valuesHeading: 'A few working principles'
values:
  - label: 'Learning is always free'
    note: "There's no opportunity cost to learning. Never stop diving into whatever you find curious."
  - label: 'Do it and get burnt'
    note: "You don't learn heat by reading about fire, so just ship it, break it, and carry what you learned."
  - label: "It's okay to reinvent the wheel"
    note: "Don't take things for granted. Real innovation comes when you do things differently, more often than not. Recompiling the kernel? Why not?"
